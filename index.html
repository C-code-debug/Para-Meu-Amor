<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ana 💖</title>
<link rel="stylesheet" href="style.css">
</style>
</head>

<body>
<div class="background"></div>
<div class="particles"></div>

<div class="card">
    <h1>💖 Para Ana 💖</h1>
    <p>Oi, meu amor.</p>
    <p>Esse site é só pra te lembrar de uma coisa:</p>
    <p><strong>Eu te amo, e isso nunca vai mudar.</strong></p>

    <button onclick="mostrarMensagem()">Clica aqui 💌</button>
    <p id="mensagemExtra"></p>
</div>

<div class="music-player">
    <div id="nomeMusica">🎵 Música</div>

    <div class="progress-container" onclick="mudarTempo(event)">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="tempo">
        <span id="tempoAtual">0:00</span>
        <span id="tempoTotal">0:00</span>
    </div>

    <div class="controles">
        <button onclick="voltar()">⏮</button>
        <button onclick="playPause()">⏯</button>
        <button onclick="proxima()">⏭</button>
    </div>
</div>



<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
